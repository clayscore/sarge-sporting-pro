    /* Reusable "tag this stand" panel — used live from the scoring screen, not upfront.
       Groups slots by pair DEFINITION (defId), not by individual repetition, so the
       shooter tags each distinct bird pairing once and just sets how many times ("× N")
       that same pairing is thrown at this stand — matching a real ESP stand board. */
    function renderStandTagPanel(st, idx) {
        const groups = {};
        st.slots.forEach(s => { const k = s.defId || s.pairId; (groups[k] = groups[k] || []).push(s); });
        return `
            <div class="border border-orange-200 bg-orange-50/40 rounded-xl p-2.5 mb-2">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-black uppercase text-orange-600">Tag Stand ${idx + 1}</span>
                </div>
                <p class="text-[8px] text-slate-400 font-bold mb-1.5">Copy this off the stand board — e.g. "rabbit from right plus quartering midi on report". Tag each distinct pair once, then set how many times it's repeated. Choke is set per shooter, down in the scoring list below.</p>
                <div class="space-y-2">
                    ${Object.entries(groups).map(([defId, defSlots]) => {
                        const pairIds = [...new Set(defSlots.map(s => s.pairId))];
                        const repCount = pairIds.length;
                        const repBirds = defSlots.filter(s => s.pairId === pairIds[0]);
                        return `
                        <div class="bg-white rounded-lg p-2 border border-slate-100">
                            <div class="flex justify-between items-center mb-1.5">
                                <select onchange="updatePairGroupType('${st.id}','${defId}', this.value)" class="glove-tag-select text-[8px] font-black uppercase text-orange-500 bg-orange-50 border border-orange-200 rounded-md px-1 py-0.5">
                                    ${db.presets.pairTypes.map(pt => `<option value="${pt.key}" ${repBirds[0].pairType === pt.key ? 'selected' : ''}>${pt.label}</option>`).join('')}
                                </select>
                                <div class="flex items-center gap-1">
                                    <span class="text-[8px] font-black uppercase text-slate-400">× repeats</span>
                                    <input type="number" min="1" max="20" value="${repCount}" onchange="setPairGroupRepeatCount('${st.id}','${defId}', this.value)" class="glove-repeat-input w-12 bg-slate-50 border border-slate-200 rounded-md p-1 text-[9px] font-black text-center">
                                    <button onclick="removePairGroup('${st.id}','${defId}')" class="text-red-400"><i data-lucide="x" size="12"></i></button>
                                </div>
                            </div>
                            <div class="grid ${repBirds.length > 1 ? 'grid-cols-2' : 'grid-cols-1'} gap-1.5">
                                ${repBirds.map(slot => `
                                    <div class="space-y-1">
                                        <select onchange="updateSlot('${st.id}','${slot.id}','clayType',this.value)" class="glove-tag-select w-full bg-slate-50 border border-slate-200 rounded-md p-1.5 text-[9px] font-bold">${db.presets.clayTypes.map(c => `<option ${slot.clayType === c ? 'selected' : ''}>${c}</option>`).join('')}</select>
                                        <select onchange="updateSlot('${st.id}','${slot.id}','presentation',this.value)" class="glove-tag-select w-full bg-slate-50 border border-slate-200 rounded-md p-1.5 text-[9px] font-bold">${db.presets.presentations.map(c => `<option ${slot.presentation === c ? 'selected' : ''}>${c}</option>`).join('')}</select>
                                        <select onchange="updateSlot('${st.id}','${slot.id}','distance',this.value)" class="glove-tag-select w-full bg-slate-50 border border-slate-200 rounded-md p-1.5 text-[9px] font-bold">${db.presets.distanceBands.map(c => `<option ${slot.distance === c ? 'selected' : ''}>${c}</option>`).join('')}</select>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="text-[7px] text-slate-400 font-bold mt-1 uppercase">${repCount} pair${repCount === 1 ? '' : 's'} thrown this way = ${repCount * repBirds.length} targets</div>
                        </div>`;
                    }).join('') || `<p class="text-[9px] text-slate-400 font-bold text-center py-2">Add a pair or single below to start scoring this stand.</p>`}
                </div>
                <div class="flex gap-1.5 mt-2 flex-wrap">
                    ${db.presets.pairTypes.map(pt => `<button onclick="addPairGroup('${st.id}','${pt.key}',1)" class="glove-pairtype-btn text-[8px] bg-white border border-slate-300 px-2 py-1 rounded-lg font-black uppercase">+ ${pt.label}</button>`).join('')}
                </div>
            </div>`;
    }

    /* =========================================================================================
       VIEW: SCORING
    ========================================================================================= */
    function viewScoring() {
        const r = activeRound();
        const st = r.stands[r.activeIdx];
        if (!st) return `<p class="text-center text-xs font-bold text-slate-400 py-8">No stands configured. <button onclick="addStand()" class="text-orange-500 underline">Add one</button></p>`;
        let sTotalShot = 0, sTotalPossible = 0;
        r.stands.forEach(s => { sTotalPossible += s.slots.length * r.shooterIds.length; r.shooterIds.forEach(shId => { const byStand = r.hits[shId]?.[s.id] || {}; s.slots.forEach(sl => { if (byStand[sl.id]?.result) sTotalShot++; }); }); });
        document.getElementById('progress-bar').style.width = sTotalPossible > 0 ? `${(sTotalShot / sTotalPossible) * 100}%` : '0%';
        const n = r.shooterIds.length;
        const leadIdx = n ? r.activeIdx % n : 0;
        const isTagging = st.slots.length === 0 || r.editingTagsForStandId === st.id;

        let standNav = r.stands.map((s, i) => `<button onclick="jumpStand(${i})" class="glove-standnav flex-shrink-0 w-11 h-11 rounded-xl font-black text-xs border-2 ${r.activeIdx === i ? 'bg-orange-500 border-orange-500 text-white shadow-lg' : s.slots.length === 0 ? 'bg-white border-dashed border-slate-300 text-slate-300' : 'bg-white border-slate-200 text-slate-500'}">${i + 1}</button>`).join('');
        standNav += `<button onclick="addStand()" class="glove-standnav flex-shrink-0 w-11 h-11 rounded-xl font-black text-xs border-2 border-dashed border-slate-300 text-slate-400">+</button>`;

        let rows = '';
        if (st.slots.length > 0) {
            for (let i = 0; i < n; i++) {
                const shId = r.shooterIds[(i + leadIdx) % n];
                const p = getProfile(shId) || { name: 'Unknown' };
                const byStand = r.hits[shId]?.[st.id] || {};
                const count = st.slots.filter(sl => { const res = byStand[sl.id]?.result; return res === 'hit1' || res === 'hit2'; }).length;
                let targetsHtml = '';
                st.slots.forEach((slot, si) => {
                    const cell = byStand[slot.id] || { result: null, missReason: null };
                    targetsHtml += `
                        <div class="glove-target-card border border-slate-200 rounded-lg p-1.5 bg-slate-50 min-w-[86px]">
                            <div class="glove-target-label text-[7px] font-black uppercase text-slate-400 truncate mb-1">${slot.clayType}<br>${slot.presentation}<br>${slot.distance || ''}</div>
                            <div class="flex gap-1">
                                <button onclick="setHit('${shId}','${st.id}','${slot.id}')" class="glove-hitmiss-btn flex-1 h-8 rounded-md font-black text-[9px] border ${(cell.result === 'hit1' || cell.result === 'hit2') ? 'hit-bg' : 'bg-white border-slate-300 text-slate-400'}">Hit</button>
                                <button onclick="setMiss('${shId}','${st.id}','${slot.id}')" class="glove-hitmiss-btn flex-1 h-8 rounded-md font-black text-[9px] border ${cell.result === 'miss' ? 'miss-bg' : 'bg-white border-slate-300 text-slate-400'}">Miss</button>
                            </div>
                            ${cell.result === 'miss' ? `<div class="flex flex-wrap gap-1 mt-1">${db.presets.missReasons.map(mr => `<span onclick="setMissReason('${shId}','${st.id}','${slot.id}','${mr}')" class="glove-missreason-chip chip ${cell.missReason === mr ? 'miss-active' : ''}" style="font-size:6px; padding:2px 5px;">${mr}</span>`).join('')}</div>` : ''}
                        </div>`;
                });
                const shooterChoke = getShooterChoke(r, shId, st.id);
                rows += `
                    <div class="p-2.5 space-y-1.5 ${i === 0 ? 'bg-orange-50/40 first-up-highlight' : ''} ${r.isLocked ? 'pointer-events-none opacity-60' : ''}">
                        <div class="flex justify-between items-center px-1">
                            <div class="flex items-center gap-1.5"><span class="glove-shooter-name text-[11px] font-black uppercase truncate max-w-[110px] tracking-tight">${p.name}</span>${i === 0 ? '<span class="bg-orange-500 text-white text-[6px] px-1 rounded-full font-black uppercase">First Up</span>' : ''}</div>
                            <div class="flex items-center gap-2">
                                <select onchange="setShooterChoke('${shId}','${st.id}', this.value)" class="glove-choke-select text-[8px] font-bold bg-slate-50 border border-slate-200 rounded-md px-1 py-0.5">
                                    <option value="">Choke —</option>
                                    ${db.presets.chokes.map(c => `<option ${shooterChoke === c ? 'selected' : ''}>${c}</option>`).join('')}
                                </select>
                                <div class="glove-count text-base font-black italic text-slate-900">${count}<span class="text-slate-300 text-[8px] not-italic ml-0.5">/${st.slots.length}</span></div>
                            </div>
                        </div>
                        <div class="flex gap-1.5 w-full overflow-x-auto pb-1 scrollbar-hide">${targetsHtml}</div>
                    </div>`;
            }
        }
        return `
            <div id="stand-nav" class="flex items-center gap-1.5 overflow-x-auto pb-1 scrollbar-hide px-1">${standNav}</div>
            <section class="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                <div class="bg-slate-900 px-3 py-2.5 text-white flex justify-between items-center">
                    <h2 class="glove-stand-title text-lg font-black italic uppercase">Stand ${r.activeIdx + 1}</h2>
                    <div class="flex items-center gap-2">
                        <span class="text-[9px] text-orange-400 font-bold uppercase">${st.slots.length} Targets</span>
                        ${st.slots.length > 0 ? `<button onclick="toggleStandTagEdit('${st.id}')" class="glove-edit-btn text-[8px] bg-slate-800 text-white px-2 py-1 rounded-lg font-black uppercase">${isTagging ? 'Done' : 'Edit'}</button>` : ''}
                    </div>
                </div>
                <div class="p-2.5">${isTagging ? renderStandTagPanel(st, r.activeIdx) : ''}</div>
                ${st.slots.length === 0 ? `<p class="text-center text-[10px] font-bold text-slate-400 pb-4">Tag this stand's targets above to start scoring it.</p>` : `<div class="divide-y divide-slate-100">${rows}</div>`}
                <div class="bg-slate-50 p-3 flex gap-3 border-t border-slate-200">
                    <button onclick="scoringNav(-1)" ${r.activeIdx === 0 ? 'disabled' : ''} class="glove-nav-btn flex-1 bg-white border border-slate-300 py-3 rounded-xl text-xs font-black disabled:opacity-30 uppercase">Prev</button>
                    ${r.activeIdx === r.stands.length - 1 ? `<button onclick="finishRound()" class="glove-nav-btn flex-1 bg-green-600 text-white py-3 rounded-xl text-xs font-black uppercase">Finish Round</button>` : `<button onclick="scoringNav(1)" class="glove-nav-btn flex-1 bg-slate-900 text-white py-3 rounded-xl text-xs font-black uppercase">Next Stand</button>`}
                </div>
            </section>
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-2 bg-slate-100 border-b border-slate-200 text-[9px] font-black uppercase text-slate-500">Leaderboard</div>
                <div class="overflow-x-auto">${renderLeaderboardTable(r)}</div>
            </section>
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3">
                <label class="text-[9px] font-black uppercase text-slate-400 mb-1 flex items-center gap-1"><i data-lucide="sticky-note" size="10"></i> Round Notes</label>
                <textarea oninput="r_upd('notes',this.value)" class="w-full h-16 bg-slate-50 rounded-xl p-3 text-xs font-bold outline-none resize-none">${r.notes}</textarea>
            </section>`;
    }
    function jumpStand(i) { if (activeRound().isLocked) return; activeRound().activeIdx = i; saveDB(); render(); }
    function toggleStandTagEdit(standId) {
        const r = activeRound();
        r.editingTagsForStandId = (r.editingTagsForStandId === standId) ? null : standId;
        saveDB(); render();
    }
    function renderLeaderboardTable(r) {
        const perf = r.shooterIds.map(id => ({ id, name: (getProfile(id) || {}).name || 'Unknown', total: shooterRoundTotal(r, id) })).sort((a, b) => b.total - a.total);
        let head = `<tr class="bg-slate-50 font-black uppercase border-b border-slate-200"><th class="p-2 border-b text-left w-12">Stand</th>${perf.map(p => `<th class="p-1 border-b border-l border-slate-200 text-center"><div class="min-w-[50px]">${p.name}</div></th>`).join('')}</tr>`;
        let body = r.stands.map((st, idx) => `<tr class="${r.activeIdx === idx ? 'bg-orange-50' : ''}"><td class="p-2 font-bold border-b text-slate-400 text-[8px]">ST ${idx + 1}</td>${perf.map(p => `<td class="p-2 text-center border-b border-l border-slate-100 font-black">${shooterStandTotal(r, p.id, st.id)}</td>`).join('')}</tr>`).join('');
        let foot = `<tr class="bg-slate-900 text-white font-black"><td class="p-2 uppercase text-[7px]">Total</td>${perf.map(p => `<td class="p-2 text-center text-sm border-l border-slate-700">${p.total}</td>`).join('')}</tr>`;
        return `<table class="w-full text-[10px]"><thead>${head}</thead><tbody>${body}</tbody><tfoot>${foot}</tfoot></table>`;
    }

    /* =========================================================================================
       VIEW: HISTORY
    ========================================================================================= */
    function viewHistory() {
        const rounds = [...db.history].sort((a, b) => (b.finishedAt || 0) - (a.finishedAt || 0));
        return `
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Round History</h3>
                <div class="space-y-2">
                    ${rounds.map(r => `
                        <button onclick="db.historyRoundId='${r.id}'; goto('round-detail')" class="w-full text-left border border-slate-200 rounded-xl p-2.5 flex justify-between items-center">
                            <div>
                                <div class="text-xs font-black uppercase">${r.ground || 'Unnamed Ground'}</div>
                                <div class="text-[9px] text-slate-400 font-bold">${getUKDate(r.date)} • ${r.event || 'No event name'} • ${r.stands.length} stands</div>
                            </div>
                            <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
                        </button>
                    `).join('') || `<p class="text-[10px] text-slate-400 font-bold text-center py-4">No completed rounds yet.</p>`}
                </div>
            </section>`;
    }

    /* =========================================================================================
       VIEW: ROUND DETAIL
    ========================================================================================= */
    function viewRoundDetail() {
        const r = round_ref();
        if (!r) return `<p class="text-center text-xs font-bold text-slate-400 py-8">Round not found.</p>`;
        const perf = r.shooterIds.map(id => ({ id, name: (getProfile(id) || {}).name || 'Unknown Shooter', total: shooterRoundTotal(r, id), att: shooterRoundAttempts(r, id) })).sort((a, b) => b.total - a.total);
        return `
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3">
                <h3 class="text-sm font-black uppercase">${r.ground || 'Unnamed Ground'}</h3>
                <p class="text-[9px] text-slate-400 font-bold mb-2">${getUKDate(r.date)} • ${r.event || 'No event name'} • Wind: ${r.conditions.wind || '—'} • Light: ${r.conditions.light || '—'}</p>
                <div class="overflow-x-auto">${renderLeaderboardTable(r)}</div>
                ${r.notes ? `<p class="text-[10px] font-bold mt-2 bg-slate-50 rounded-lg p-2">${r.notes}</p>` : ''}
            </section>
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Final Standings</h3>
                <div class="space-y-1.5">
                    ${perf.map((p, i) => `<div class="flex justify-between items-center p-2 rounded-lg ${i === 0 ? 'bg-orange-50' : 'bg-slate-50'}"><span class="text-xs font-black uppercase">${i + 1}. ${p.name}</span><span class="text-sm font-black">${p.total}/${p.att}</span></div>`).join('')}
                </div>
            </section>
            <button onclick="db.historyRoundId=null; goto('history')" class="w-full bg-white border border-slate-300 py-3 rounded-xl text-xs font-black uppercase">← Back to History</button>`;
    }

    /* =========================================================================================
       VIEW: ANALYSIS
    ========================================================================================= */
    function barRow(label, pct, attempts, lowSample) {
        return `<div class="space-y-0.5">
            <div class="flex justify-between text-[9px] font-black uppercase"><span class="truncate max-w-[70%]">${label}${lowSample ? ' <span class=\"text-slate-300\">(low sample)</span>' : ''}</span><span>${pct}% <span class="text-slate-300">(${attempts})</span></span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%; ${lowSample ? 'opacity:0.4;' : ''}"></div></div>
        </div>`;
    }
    function viewAnalysis() {
        if (db.profiles.length === 0) return `<p class="text-center text-xs font-bold text-slate-400 py-8">Add a shooter profile first.</p>`;
        if (!db.analysisShooterId || !getProfile(db.analysisShooterId)) db.analysisShooterId = (getMainUser() || db.profiles[0]).id;
        const shooterId = db.analysisShooterId;
        const shots = getAllShots({ shooterId });
        const byType = pctBy(shots, s => s.clayType);
        const byPres = pctBy(shots, s => s.presentation);
        const byDistance = pctBy(shots.filter(s => s.distance), s => s.distance);
        const byPresDistance = pctBy(shots.filter(s => s.distance), s => s.presentation + ' — ' + s.distance);
        const byGround = pctBy(shots, s => s.ground);
        const byChoke = pctBy(shots, s => s.choke);
        const barrels = barrelSplit(shots);
        const best = bestRound(shooterId);
        const missReasons = pctBy(shots.filter(s => s.result === 'miss' && s.missReason), s => s.missReason, 1);
        const fatigue = fatigueBuckets(shots);
        const trend = trendByDate(shots);
        const rollingAvg = rollingAverage(shooterId, db.avgWindow);
        const weakestType = byType.find(t => !t.lowSample);
        const weakestPres = byPres.find(t => !t.lowSample);
        const weakestDistance = byDistance.find(t => !t.lowSample);
        const p = getProfile(shooterId);
        const careerHits = shots.filter(s => s.result === 'hit1' || s.result === 'hit2').length;
        const careerTotals = { shots: shots.length, hits: careerHits, misses: shots.length - careerHits, pct: shots.length ? Math.round(careerHits / shots.length * 100) : 0 };

        return `
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3">
                <div class="flex items-center justify-between">
                    <label class="text-[9px] font-black uppercase text-slate-400">Shooter</label>
                    ${p.isMainUser ? `<span class="chip active" style="background:#f97316; border-color:#f97316;"><i data-lucide="star" size="9"></i> My Stats</span>` : ''}
                </div>
                <select onchange="db.analysisShooterId=this.value; saveDB(); render();" class="w-full bg-slate-50 rounded-lg p-2 text-xs font-black mt-1">
                    ${db.profiles.map(pr => `<option value="${pr.id}" ${shooterId === pr.id ? 'selected' : ''}>${pr.isMainUser ? '★ ' : ''}${pr.name}${pr.isMainUser ? ' (Me)' : ''}</option>`)}
                </select>
                <button onclick="resetShooterStats('${shooterId}')" class="w-full mt-2 bg-red-50 border border-red-200 text-red-600 py-2 rounded-xl text-[9px] font-black uppercase">Reset This Shooter's Stats</button>
            </section>

            ${p.isMainUser && (p.cpsaAverage || p.cpsaIssue) ? `<section class="bg-white rounded-xl shadow-sm border border-orange-200 p-3">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-orange-500 mb-1">CPSA Record</h3>
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div><div class="text-lg font-black">${p.class}</div><div class="text-[7px] font-black uppercase text-slate-400">Classification</div></div>
                    <div><div class="text-lg font-black">${p.cpsaAverage || '—'}${p.cpsaAverage ? '%' : ''}</div><div class="text-[7px] font-black uppercase text-slate-400">Average</div></div>
                    <div><div class="text-lg font-black">${p.cpsaIssue || '—'}</div><div class="text-[7px] font-black uppercase text-slate-400">Issue</div></div>
                </div>
                ${p.cpsaUpdated ? `<div class="text-[7px] text-slate-400 font-bold text-center mt-1">Updated ${new Date(p.cpsaUpdated).toLocaleDateString('en-GB')} — edit in Shooter Profiles</div>` : ''}
            </section>` : ''}

            ${shots.length === 0 ? `<p class="text-center text-[10px] font-bold text-slate-400 py-6">No tagged shots yet for ${p.name}. Score a round with stand tagging to see analysis here.</p>` : `

            <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Career Totals</h3>
                <div class="grid grid-cols-4 gap-2 text-center">
                    <div><div class="text-xl font-black">${careerTotals.shots}</div><div class="text-[7px] font-black uppercase text-slate-400">Shots Fired</div></div>
                    <div><div class="text-xl font-black text-green-600">${careerTotals.hits}</div><div class="text-[7px] font-black uppercase text-slate-400">Hits</div></div>
                    <div><div class="text-xl font-black text-red-500">${careerTotals.misses}</div><div class="text-[7px] font-black uppercase text-slate-400">Misses</div></div>
                    <div><div class="text-xl font-black text-orange-500">${careerTotals.pct}%</div><div class="text-[7px] font-black uppercase text-slate-400">Accuracy</div></div>
                </div>
            </section>

            <section class="bg-slate-900 text-white rounded-xl shadow-sm p-3">
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div><div class="text-2xl font-black">${rollingAvg !== null ? rollingAvg + '%' : '—'}</div><div class="text-[8px] font-black uppercase text-slate-400">Rolling Avg (last ${db.avgWindow} rounds)</div></div>
                    <div><div class="text-2xl font-black">${barrels.total ? barrels.pctFirst + '%' : '—'}</div><div class="text-[8px] font-black uppercase text-slate-400">Hits on 1st Barrel</div></div>
                    <div><div class="text-2xl font-black">${barrels.total ? barrels.pctSecond + '%' : '—'}</div><div class="text-[8px] font-black uppercase text-slate-400">Hits on 2nd Barrel</div></div>
                </div>
                <p class="text-[8px] text-slate-500 font-bold text-center mt-2 uppercase">Rolling average is a simple mean of past round hit% — not an official CPSA classification average. Barrel % is share of hits, not attempts.</p>
            </section>

            ${weakestType ? `<section class="bg-orange-50 border border-orange-200 rounded-xl p-3">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-orange-500 mb-1">Coaching Focus</h3>
                <div class="text-[9px] font-black uppercase text-orange-600">Weakest clay type: ${weakestType.key} (${weakestType.pct}%)</div>
                ${weakestPres ? `<div class="text-[9px] font-black uppercase text-orange-600 mt-1">Weakest presentation: ${weakestPres.key} (${weakestPres.pct}%)</div>` : ''}
                ${weakestDistance ? `<div class="text-[9px] font-black uppercase text-orange-600 mt-1">Weakest distance: ${weakestDistance.key} (${weakestDistance.pct}%)</div>` : ''}
            </section>` : ''}

            ${best ? `<section class="bg-green-50 border border-green-200 rounded-xl p-3">
                <div class="text-[9px] font-black uppercase text-green-700">All-Time Best Round: ${best.ground} — ${getUKDate(best.date)}${best.event ? ' (' + best.event + ')' : ''}</div>
                <div class="text-lg font-black text-green-700">${best.total}/${best.att} <span class="text-xs">(${best.pct}%)</span></div>
                <button onclick="db.historyRoundId='${best.roundId}'; goto('round-detail')" class="text-[9px] font-black uppercase text-green-700 underline">View this round →</button>
            </section>` : ''}

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 space-y-2">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Hit % by Clay Type</h3>
                    ${byType.map(t => barRow(t.key, t.pct, t.attempts, t.lowSample)).join('')}
                </section>

                <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 space-y-2">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Hit % by Presentation</h3>
                    ${byPres.map(t => barRow(t.key, t.pct, t.attempts, t.lowSample)).join('')}
                </section>

                ${byDistance.length ? `<section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 space-y-2">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Hit % by Distance</h3>
                    ${byDistance.map(t => barRow(t.key, t.pct, t.attempts, t.lowSample)).join('')}
                </section>` : ''}

                ${byGround.length > 1 ? `<section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 space-y-2">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Hit % by Ground</h3>
                    ${byGround.map(t => barRow(t.key, t.pct, t.attempts, t.lowSample)).join('')}
                </section>` : ''}

                ${byChoke.length > 1 ? `<section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 space-y-2">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Hit % by Choke</h3>
                    ${byChoke.map(t => barRow(t.key, t.pct, t.attempts, t.lowSample)).join('')}
                </section>` : ''}
            </div>

            ${byPresDistance.length ? `<section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 space-y-2">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Hit % by Presentation × Distance</h3>
                <p class="text-[8px] text-slate-400 font-bold uppercase -mt-1">e.g. spot far crossers vs close crossers</p>
                ${byPresDistance.map(t => barRow(t.key, t.pct, t.attempts, t.lowSample)).join('')}
            </section>` : ''}

            ${missReasons.length ? `<section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 space-y-2">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Miss Reasons (tagged misses only)</h3>
                ${missReasons.map(t => `<div class="flex justify-between text-[9px] font-black uppercase"><span>${t.key}</span><span>${t.attempts}</span></div>`).join('')}
            </section>` : ''}

            <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 space-y-2">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Fatigue — Hit % by Position in Round</h3>
                ${fatigue.map(t => barRow(t.key, t.pct, t.attempts, false)).join('')}
            </section>

            <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 space-y-2">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Trend Over Time</h3>
                ${trend.length ? `<div style="position:relative; height:160px;"><canvas id="trend-chart"></canvas></div>` : `<p class="text-[9px] text-slate-400 font-bold text-center py-2">Not enough tagged rounds yet to show a trend.</p>`}
            </section>

            <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Goals</h3>
                    <button onclick="addGoal('${shooterId}')" class="text-[9px] bg-slate-900 text-white px-3 py-1 rounded-lg font-black uppercase">+ Add Goal</button>
                </div>
                <div class="space-y-2">
                    ${(p.goals || []).map(g => {
                        const prog = goalProgress(shooterId, g);
                        return `<div class="border border-slate-200 rounded-xl p-2 space-y-1.5">
                            <div class="grid grid-cols-2 gap-1.5">
                                <select onchange="updateGoal('${shooterId}','${g.id}','metricType',this.value)" class="bg-slate-50 rounded-md p-1.5 text-[9px] font-bold"><option value="clayType" ${g.metricType==='clayType'?'selected':''}>Clay Type</option><option value="presentation" ${g.metricType==='presentation'?'selected':''}>Presentation</option><option value="distance" ${g.metricType==='distance'?'selected':''}>Distance</option></select>
                                <select onchange="updateGoal('${shooterId}','${g.id}','metricValue',this.value)" class="bg-slate-50 rounded-md p-1.5 text-[9px] font-bold">${metricPresetList(g.metricType).map(v => `<option ${g.metricValue === v ? 'selected' : ''}>${v}</option>`).join('')}</select>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-[8px] font-black uppercase text-slate-400">Target %</span>
                                <input type="number" value="${g.targetPct}" onchange="updateGoal('${shooterId}','${g.id}','targetPct',this.value)" class="w-16 bg-slate-50 rounded-md p-1 text-[9px] font-bold">
                                <button onclick="removeGoal('${shooterId}','${g.id}')" class="ml-auto text-red-400"><i data-lucide="trash-2" size="14"></i></button>
                            </div>
                            <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100, prog.pct)}%; ${prog.pct >= g.targetPct ? 'background:#16a34a;' : ''}"></div></div>
                            <div class="text-[8px] font-black uppercase text-slate-400">${prog.pct}% currently (${prog.attempts} shots) vs ${g.targetPct}% target</div>
                        </div>`;
                    }).join('') || `<p class="text-[9px] text-slate-400 font-bold text-center py-2">No goals set yet.</p>`}
                </div>
            </section>
            `}`;
    }

    /* =========================================================================================
       VIEW: SETTINGS
    ========================================================================================= */
    function presetEditor(title, listName) {
        return `<section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3">
            <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">${title}</h3>
            <div class="flex flex-wrap gap-1.5 mb-2">
                ${db.presets[listName].map(v => `<span class="chip active">${v} <i onclick="removePreset('${listName}','${v.replace(/'/g, "\\'")}')" data-lucide="x" size="10"></i></span>`).join('')}
            </div>
            <div class="flex gap-1.5">
                <input type="text" id="new-${listName}" placeholder="Add new..." class="flex-1 bg-slate-50 rounded-lg p-2 text-xs font-bold">
                <button onclick="addPreset('${listName}', document.getElementById('new-${listName}').value); document.getElementById('new-${listName}').value='';" class="bg-slate-900 text-white px-3 rounded-lg text-[9px] font-black uppercase">Add</button>
            </div>
        </section>`;
    }
    function viewSettings() {
        return `
            ${presetEditor('Clay Types', 'clayTypes')}
            ${presetEditor('Presentations', 'presentations')}
            ${presetEditor('Miss Reasons', 'missReasons')}
            ${presetEditor('Chokes', 'chokes')}
            ${presetEditor('Cartridges', 'cartridges')}
            ${presetEditor('Distance Bands', 'distanceBands')}
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3">
                <div class="flex justify-between items-center">
                    <div class="pr-3">
                        <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Glove Mode</h3>
                        <p class="text-[9px] text-slate-400 font-bold mt-1">Bigger buttons, cards and text on the scoring screen — for shooting in gloves or cold weather. Also toggleable from a hand icon in the scoring screen's header.</p>
                    </div>
                    <button onclick="toggleGloveMode()" class="${db.gloveMode ? 'bg-orange-500' : 'bg-slate-200'} w-12 h-7 rounded-full relative flex-shrink-0">
                        <span class="absolute top-0.5 ${db.gloveMode ? 'left-6' : 'left-0.5'} w-6 h-6 bg-white rounded-full shadow"></span>
                    </button>
                </div>
            </section>
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Rolling Average Window</h3>
                <div class="flex items-center gap-2">
                    <input type="number" min="1" max="50" value="${db.avgWindow}" onchange="db.avgWindow=parseInt(this.value)||6; saveDB();" class="w-20 bg-slate-50 rounded-lg p-2 text-xs font-bold">
                    <span class="text-[9px] text-slate-400 font-bold uppercase">rounds used for the Analysis rolling average</span>
                </div>
            </section>
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Backup &amp; Restore</h3>
                <p class="text-[9px] text-slate-400 font-bold mb-2">All your data lives in this browser only. Export a backup regularly so a cleared cache or new device doesn't lose your history.</p>
                <div class="flex gap-2">
                    <button onclick="exportBackup()" class="flex-1 bg-slate-900 text-white py-2.5 rounded-xl text-[10px] font-black uppercase">Export Backup</button>
                    <button onclick="triggerImport()" class="flex-1 bg-white border border-slate-300 py-2.5 rounded-xl text-[10px] font-black uppercase">Restore Backup</button>
                </div>
            </section>
            <section class="bg-white rounded-xl shadow-sm border border-red-200 p-3">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-red-400 mb-2">Danger Zone</h3>
                <button onclick="resetAllData()" class="w-full bg-red-50 border border-red-200 text-red-600 py-2.5 rounded-xl text-[10px] font-black uppercase">Erase All Data</button>
            </section>`;
    }

    /* =========================================================================================
       INIT
    ========================================================================================= */
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Registration failed', err)); });
    }
    window.onload = () => { loadDB(); render(); };
    </script>
</body>
</html>
